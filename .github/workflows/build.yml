name: Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        architecture: [x64, Win32]
        config: [Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -A ${{ matrix.architecture }}

      - name: Build
        run: cmake --build build --config ${{ matrix.config }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
            name: DLLInjector-${{ matrix.architecture }}-${{ matrix.config }}
            path: build/${{ matrix.config }}/DLLInjector.exe